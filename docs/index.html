    <script>
      (function() {
        const savedMode = localStorage.getItem("darkMode");
        const darkMode = savedMode !== null ? JSON.parse(savedMode) : true;
        if (darkMode) {
          document.body.classList.add("dark-mode");
        } else {
          document.body.classList.add("light-mode");
        }
      })();
    </script>
